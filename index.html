<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empire AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h2>👑 Empire AI</h2>

        <button class="menu active" data-mode="ideas">
            💡 Idées de vidéos
        </button>

        <button class="menu" data-mode="script">
            📝 Scripts
        </button>

        <button class="menu" data-mode="hook">
            🪝 Hooks
        </button>

        <button class="menu" data-mode="title">
            🎯 Titres
        </button>

        <button class="menu" data-mode="description">
            📄 Descriptions
        </button>

        <button class="menu" data-mode="calendar">
            📅 Calendrier
        </button>

        <button class="menu" data-mode="complete">
            ⭐ Génération complète
        </button>

    </aside>

    <main class="content">

        <header>

            <h1>Empire AI</h1>

            <p>
                Ton assistant IA pour créer du contenu YouTube, TikTok et Instagram.
            </p>

        </header>

        <section class="generator">

            <textarea
            id="theme"
            placeholder="Exemple : Je crée une chaîne YouTube sur Minecraft destinée aux adolescents."
            ></textarea>

            <button id="generateBtn" onclick="generate()">
                🚀 Générer
            </button>

        </section>

        <section id="result">

            👋 Bienvenue sur Empire AI.

            <br><br>

            Choisis un outil dans le menu de gauche puis clique sur <b>Générer</b>.

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
