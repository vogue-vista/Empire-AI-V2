<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Empire AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h2>👑 Empire AI</h2>

        <button class="menu active" data-mode="ideas">
            💡 Idées de vidéos
        </button>

        <button class="menu" data-mode="script">
            📝 Scripts
        </button>

        <button class="menu" data-mode="hook">
            🪝 Hooks
        </button>

        <button class="menu" data-mode="title">
            🎯 Titres
        </button>

        <button class="menu" data-mode="description">
            📄 Descriptions
        </button>

        <button class="menu" data-mode="calendar">
            📅 Calendrier
        </button>

    </aside>

    <main class="content">

        <header>

            <h1>Assistant Créateur IA</h1>

            <p>
                Choisis un outil à gauche, décris ton projet et Empire AI fera le reste.
            </p>

        </header>

        <section class="generator">

            <textarea
                id="theme"
                placeholder="Exemple : Je crée une chaîne YouTube sur Minecraft. Donne-moi des idées originales..."
            ></textarea>

            <button onclick="generate()">
                🚀 Générer
            </button>

        </section>

        <section id="result">

            👋 Bienvenue sur Empire AI !

            <br><br>

            Sélectionne un outil dans le menu de gauche puis clique sur <b>Générer</b>.

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
