<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empire AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h2>👑 Empire AI</h2>

        <button class="menu active">💡 Idées</button>
        <button class="menu">📝 Scripts</button>
        <button class="menu">🪝 Hooks</button>
        <button class="menu">🎯 Titres</button>
        <button class="menu">📄 Descriptions</button>
        <button class="menu">📅 Calendrier</button>

    </aside>

    <main class="content">

        <header>

            <h1>Assistant Créateur</h1>

            <p>
                Décris ton idée et laisse Empire AI créer ton contenu.
            </p>

        </header>

        <section class="generator">

            <textarea
                id="theme"
                placeholder="Exemple : Je fais une chaîne YouTube sur Minecraft. Donne-moi 10 idées originales."
            ></textarea>

            <button onclick="generate()">

                🚀 Générer

            </button>

        </section>

        <section id="result">

            Les réponses de l'IA apparaîtront ici...

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
